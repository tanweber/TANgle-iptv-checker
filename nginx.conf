map $http_x_forwarded_for $real_ip {
    default $remote_addr;
    "~^(?P<ip>[^,]+)" $ip;
}

server {
    listen 80;
    server_name _;

    location /rus_fixed.m3u {
        proxy_pass http://iptv-checker:9239/p/rus_fixed.m3u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }

    location /epg.xml {
        proxy_pass http://iptv-checker:9239/epg.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
